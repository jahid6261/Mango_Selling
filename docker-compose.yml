version: "3.9"

services:

  db:
    image: postgres:15-alpine
    container_name: mango-postgres-db

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: jahid1234
      POSTGRES_DB: mango_db

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mango_db"]
      interval: 5s
      timeout: 5s
      retries: 5

    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    container_name: mango-rabbitmq

    ports:
      - "5672:5672"
      - "15672:15672"

    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: always

  web:
    build: .
    container_name: mango-fastapi

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

    restart: always

  worker:
    build: .
    container_name: mango-celery

    command: celery -A src.core.celery_app.celery_app worker --loglevel=info

    volumes:
      - .:/app

    depends_on:
      rabbitmq:
        condition: service_healthy

    restart: always

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mango-pgadmin

    ports:
      - "5050:80"

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    volumes:
      - pgadmin_data:/var/lib/pgadmin  

    depends_on:
      db:
        condition: service_healthy

    restart: always

volumes:
  postgres_data:
  rabbitmq_data:
  pgadmin_data: